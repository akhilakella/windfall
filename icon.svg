<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" shape-rendering="geometricPrecision">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2e18"/>
      <stop offset="100%" stop-color="#0f1a0e"/>
    </radialGradient>
    <radialGradient id="appleGrad" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#e8523a"/>
      <stop offset="60%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#922b21"/>
    </radialGradient>
    <radialGradient id="leafGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#7db874"/>
      <stop offset="100%" stop-color="#2d5a27"/>
    </radialGradient>
    <radialGradient id="pinGrad" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#7db874"/>
      <stop offset="100%" stop-color="#4a7c3f"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <!-- Subtle ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#4a7c3f" stroke-width="2" opacity="0.3"/>

  <!-- Apple body -->
  <ellipse cx="256" cy="295" rx="115" ry="118" fill="url(#appleGrad)" filter="url(#softShadow)"/>

  <!-- Apple top indent -->
  <ellipse cx="256" cy="186" rx="28" ry="14" fill="#922b21"/>

  <!-- Apple shine -->
  <ellipse cx="225" cy="245" rx="22" ry="32" fill="white" opacity="0.18" transform="rotate(-20,225,245)"/>
  <ellipse cx="218" cy="238" rx="8" ry="14" fill="white" opacity="0.25" transform="rotate(-20,218,238)"/>

  <!-- Stem -->
  <path d="M256 182 Q262 155 278 140 Q292 128 304 138" stroke="#5d3a1a" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Leaf -->
  <path d="M278 155 Q310 130 325 148 Q315 175 285 170 Z" fill="url(#leafGrad)" opacity="0.95"/>
  <path d="M278 155 Q298 158 310 165" stroke="#2d5a27" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Map pin overlay (bottom right) -->
  <g transform="translate(320, 330)" filter="url(#glow)">
    <!-- Pin head -->
    <circle cx="42" cy="42" r="42" fill="url(#pinGrad)" opacity="0.95"/>
    <circle cx="42" cy="42" r="42" fill="none" stroke="#7db874" stroke-width="3" opacity="0.6"/>
    <!-- Pin point -->
    <polygon points="42,84 18,120 66,120" fill="#4a7c3f"/>
    <polygon points="42,84 28,112 42,105" fill="#2d5a27"/>
    <!-- White dot in pin -->
    <circle cx="42" cy="42" r="16" fill="white" opacity="0.9"/>
    <circle cx="42" cy="42" r="8" fill="#4a7c3f"/>
  </g>

  <!-- Small decorative dots (map feel) -->
  <circle cx="120" cy="340" r="7" fill="#4a7c3f" opacity="0.5"/>
  <circle cx="145" cy="370" r="5" fill="#4a7c3f" opacity="0.35"/>
  <circle cx="98" cy="375" r="4" fill="#7db874" opacity="0.3"/>

  <!-- "W" wordmark at bottom -->
  <text x="256" y="492" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="900" fill="#4a7c3f" opacity="0.7" letter-spacing="8">WINDFALL</text>
</svg>
